name: Validate Document

on:
  pull_request:
    branches:
      - master
    paths:
      - "website/**/*.mdx"

  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base branch to compare against (for manual runs)"
        required: false
        default: "master"
        type: string
      logLevel:
        description: "Log level"
        required: true
        default: "warning"
        type: choice
        options:
          - info
          - warning
          - debug

jobs:
  validate_document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run validate document script
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
          else
            BASE_REF="${{ inputs.base_ref }}"
          fi

          FILES=$(git diff --name-only origin/$BASE_REF HEAD | grep '\.mdx$')
          echo "Changed document files: $FILES"
          if [ -z "$FILES" ]; then
            echo "No document files changed."
            exit 0
          fi

          # Filter out files that no longer exist
          EXISTING_FILES=""
          for FILE in $FILES; do
            if [ -f "$FILE" ]; then
              EXISTING_FILES="$EXISTING_FILES $FILE"
            else
              echo "Warning: File '$FILE' no longer exists and will be skipped."
            fi
          done

          if [ -z "$EXISTING_FILES" ]; then
            echo "No existing markdown files found after filtering."
            exit 0
          fi

          node website/validate-document.js $EXISTING_FILES
